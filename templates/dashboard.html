<!DOCTYPE html>
<html>
<head>
<title>AI Questionnaire Tool</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.container{
width:500px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:10px;
}

button{
background:#3498db;
border:none;
padding:10px 18px;
color:white;
border-radius:5px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#2980b9;
}

input[type=file]{
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
AI Questionnaire Answering Tool
</div>

<div class="container">

<h2>Upload Questionnaire</h2>

<form action="/upload_questionnaire" method="post" enctype="multipart/form-data">
<input type="file" name="file">
<br>
<button type="submit">Upload Questionnaire</button>
</form>

<br>

<h2>Upload Reference Document</h2>

<form action="/upload_reference" method="post" enctype="multipart/form-data">
<input type="file" name="file">
<br>
<button type="submit">Upload Reference</button>
</form>

<br>

<h2>Generate AI Answers</h2>

<form action="/generate" method="post">
<button type="submit">Generate Answers</button>
</form>

</div>

</body>
</html>
